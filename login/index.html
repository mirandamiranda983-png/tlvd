<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toast-enter { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div id="auth-container" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm transition-all duration-500">
        <h2 id="form-title" class="text-3xl font-extrabold mb-8 text-center text-slate-800">Iniciar Sesión</h2>
        
        <form id="auth-form" class="space-y-4">
            <!-- Campos dinámicos -->
            <div id="name-fields" class="hidden space-y-4">
                <input type="text" id="firstName" placeholder="Nombre" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="text" id="lastName" placeholder="Apellido" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <input type="email" id="email" placeholder="Correo electrónico" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
            <input type="password" id="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
            
            <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">Entrar</button>
        </form>

        <div class="mt-6 text-center space-y-3">
            <button onclick="toggleMode()" id="toggle-text" class="text-indigo-600 font-medium hover:underline">¿No tienes cuenta? Crea una</button>
            <button onclick="showResetUI()" class="text-slate-400 text-sm block w-full hover:text-slate-600">¿Olvidaste tu contraseña?</button>
        </div>

        <div class="my-8 border-t flex flex-col items-center">
            <span class="bg-white px-4 -mt-3 text-slate-400 text-xs uppercase">O continúa con</span>
            <button id="google-btn" class="mt-4 flex items-center gap-3 w-full justify-center border p-3 rounded-xl hover:bg-slate-50 transition">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google
            </button>
        </div>
    </div>

    <div id="toast-container" class="fixed top-5 right-5 z-50 space-y-2"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCS4QGSz_ZVBIrevOLT7Ad6DXVLufKxLmk",
            authDomain: "tlvd-6cf32.firebaseapp.com",
            projectId: "tlvd-6cf32",
            storageBucket: "tlvd-6cf32.firebasestorage.app",
            messagingSenderId: "249745100905",
            appId: "1:249745100905:web:f4d0905eed777ed3f6d2f8",
            measurementId: "G-1S1NYNMLPW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let isLogin = true;

        window.showToast = (msg, type = "indigo") => {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = `toast-enter p-4 rounded-xl shadow-lg text-white font-medium bg-${type}-600`;
            div.innerText = msg;
            container.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        };

        window.toggleMode = () => {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? 'Iniciar Sesión' : 'Crear Cuenta';
            document.getElementById('submit-btn').innerText = isLogin ? 'Entrar' : 'Registrarse';
            document.getElementById('toggle-text').innerText = isLogin ? '¿No tienes cuenta? Crea una' : '¿Ya tienes cuenta? Inicia sesión';
            document.getElementById('name-fields').classList.toggle('hidden', isLogin);
            document.getElementById('auth-form').reset();
        };

        window.showResetUI = () => {
            const email = prompt("Ingresa tu correo para recuperar la contraseña:");
            if (email) {
                sendPasswordResetEmail(auth, email)
                    .then(() => showToast("Correo de recuperación enviado", "green"))
                    .catch(err => showToast("Error: " + err.message, "red"));
            }
        };

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const name = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                    showToast("¡Bienvenido de nuevo!", "green");
                } else {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", cred.user.uid), { name, lastName, email, createdAt: new Date() });
                    showToast("Cuenta creada correctamente", "green");
                }
            } catch (err) {
                showToast(err.message, "red");
            }
        });

        document.getElementById('google-btn').addEventListener('click', async () => {
            try {
                const res = await signInWithPopup(auth, provider);
                await setDoc(doc(db, "users", res.user.uid), { email: res.user.email, lastLogin: new Date() }, { merge: true });
                showToast("Sesión iniciada con Google", "green");
            } catch (err) {
                showToast(err.message, "red");
            }
        });
    </script>
</body>
</html>
